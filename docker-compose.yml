version: "3.9"

services:
  mysql:
    image: mysql:8
    container_name: eventzen-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: eventzen_db
    ports:
      - "3307:3306"
    networks:
      - eventzen-network

  backend:
    build: ./eventzen/auth-service
    container_name: eventzen-backend
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_started
    networks:
      - eventzen-network

  frontend:
    build: ./eventzen-frontend
    container_name: eventzen-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - eventzen-network

  budget-service:
    build: ./eventzen-budget-service
    container_name: eventzen-budget-service
    ports:
      - "5000:5000"
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: 1234
      DB_NAME: eventzen_db
      PORT: 5000
    networks:
      - eventzen-network

networks:
  eventzen-network: